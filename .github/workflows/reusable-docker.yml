name: Reusable - Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Docker image name"
        required: true
        type: string

      tag:
        description: "Primary tag"
        required: true
        type: string

      extra_tags:
        description: "Comma separated extra tags"
        required: false
        default: ""
        type: string

      push:
        description: "Push image to Docker Hub"
        required: false
        default: true
        type: boolean

    secrets:
      docker_username:
        description: "Docker Hub username"
      docker_token:
        description: "Docker Hub token"

    outputs:
      image_url:
        description: "Full Docker image URL"
        value: ${{ jobs.docker.outputs.image_url }}
      pushed:
        description: "Whether the image was pushed to Docker Hub"
        value: ${{ jobs.docker.outputs.pushed }}

permissions:
  contents: read

jobs:
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.output.outputs.image_url }}
      pushed: ${{ steps.check-push.outputs.should_push }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute push mode
        id: check-push
        shell: bash
        run: |
          should_push=false
          if [ "${{ inputs.push }}" = "true" ] && [ -n "${{ secrets.docker_username }}" ] && [ -n "${{ secrets.docker_token }}" ]; then
            should_push=true
          fi
          echo "should_push=$should_push" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        if: ${{ steps.check-push.outputs.should_push == 'true' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Generate Docker Metadata
        id: meta
        shell: bash
        run: |
          DOCKER_USER="${{ secrets.docker_username }}"
          if [ -z "$DOCKER_USER" ]; then
            DOCKER_USER="devopsprajyot"
          fi

          IMAGE="${DOCKER_USER}/${{ inputs.image_name }}"
          IMAGE_URL="${IMAGE}:${{ inputs.tag }}"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "$IMAGE_URL"

            if [ -n "${{ inputs.extra_tags }}" ]; then
              IFS=',' read -ra TAGS <<< "${{ inputs.extra_tags }}"
              for tag in "${TAGS[@]}"; do
                echo "$IMAGE:$tag"
              done
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ steps.check-push.outputs.should_push == 'true' }}
          load: ${{ steps.check-push.outputs.should_push != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set Workflow Output
        id: output
        shell: bash
        run: |
          echo "image_url=${{ steps.meta.outputs.image_url }}" >> "$GITHUB_OUTPUT"
          echo "pushed=${{ steps.check-push.outputs.should_push }}" >> "$GITHUB_OUTPUT"

      - name: Verify Output
        shell: bash
        run: |
          echo "Returned image_url:"
          echo "${{ steps.meta.outputs.image_url }}"

      - name: Workflow Summary
        shell: bash
        run: |
          {
            echo "## 🐳 Docker Build Summary"
            echo ""
            echo "- Image: ${{ steps.meta.outputs.image }}"
            echo "- Image URL: ${{ steps.meta.outputs.image_url }}"
            echo "- Push: ${{ inputs.push }}"
            echo "- Digest: ${{ steps.build.outputs.digest }}"
          } >> "$GITHUB_STEP_SUMMARY"