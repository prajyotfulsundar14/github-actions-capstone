name: Reusable - Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: "Docker image name"
        required: true
        type: string

      tag:
        description: "Primary tag"
        required: true
        type: string

      extra_tags:
        description: "Comma separated extra tags"
        required: false
        default: ""
        type: string

      push:
        description: "Push image to Docker Hub"
        required: false
        default: true
        type: boolean

    secrets:
      docker_username:
        required: true

      docker_token:
        required: true

    outputs:
      image_url:
        description: "Docker image URL"
        value: ${{ jobs.docker.outputs.image_url }}

permissions:
  contents: read

jobs:
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.output.outputs.image_url }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: inputs.push
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Generate Docker Tags
        id: meta
        shell: bash
        run: |
          IMAGE=${{ secrets.docker_username }}/${{ inputs.image_name }}

          echo "image=$IMAGE" >> $GITHUB_OUTPUT

          {
            echo "tags<<EOF"
            echo "$IMAGE:${{ inputs.tag }}"

            if [ -n "${{ inputs.extra_tags }}" ]; then
              IFS=',' read -ra TAGS <<< "${{ inputs.extra_tags }}"
              for tag in "${TAGS[@]}"; do
                echo "$IMAGE:$tag"
              done
            fi

            echo "EOF"
          } >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        id: docker
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set Workflow Output
        id: output
        run: |
          echo "image_url=${{ steps.meta.outputs.image }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT

      - name: Workflow Summary
        run: |
          {
            echo "## 🐳 Docker Build Summary"
            echo ""
            echo "- Image: ${{ steps.meta.outputs.image }}"
            echo "- Primary Tag: ${{ inputs.tag }}"
            echo "- Push: ${{ inputs.push }}"
            echo "- Digest: ${{ steps.docker.outputs.digest }}"
          } >> $GITHUB_STEP_SUMMARY