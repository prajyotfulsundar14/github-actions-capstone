name: Reusable - Docker Build & Push

on:
  workflow_call:
    inputs:
      image_name:
        description: Docker image name
        required: true
        type: string

      tag:
        description: Primary image tag
        required: true
        type: string

      extra_tags:
        description: Comma-separated extra tags
        required: false
        default: ""
        type: string

      push:
        description: Push image to Docker Hub
        required: false
        default: true
        type: boolean

    secrets:
      docker_username:
        required: true
      docker_token:
        required: true

    outputs:
      image_url:
        description: Full Docker image URL
        value: ${{ jobs.docker.outputs.image_url }}

      pushed:
        description: Whether image was pushed
        value: ${{ jobs.docker.outputs.pushed }}

permissions:
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    outputs:
      image_url: ${{ steps.output.outputs.image_url }}
      pushed: ${{ steps.output.outputs.pushed }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Determine Push Mode
        id: pushmode
        shell: bash
        run: |
          if [[ "${{ inputs.push }}" == "true" ]]; then
            echo "push=true" >> "$GITHUB_OUTPUT"
          else
            echo "push=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        if: steps.pushmode.outputs.push == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Generate Image Metadata
        id: meta
        shell: bash
        run: |
          IMAGE="${{ secrets.docker_username }}/${{ inputs.image_name }}"
          IMAGE_URL="${IMAGE}:${{ inputs.tag }}"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
          echo "image_url=$IMAGE_URL" >> "$GITHUB_OUTPUT"

          {
            echo "tags<<EOF"
            echo "$IMAGE_URL"

            if [[ -n "${{ inputs.extra_tags }}" ]]; then
              IFS=',' read -ra TAGS <<< "${{ inputs.extra_tags }}"
              for tag in "${TAGS[@]}"; do
                echo "$IMAGE:$tag"
              done
            fi

            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and Push Docker Image
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ steps.pushmode.outputs.push == 'true' }}
          load: ${{ steps.pushmode.outputs.push != 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export Workflow Outputs
        id: output
        shell: bash
        run: |
          echo "image_url=${{ steps.meta.outputs.image_url }}" >> "$GITHUB_OUTPUT"
          echo "pushed=${{ steps.pushmode.outputs.push }}" >> "$GITHUB_OUTPUT"

      - name: Debug Outputs
        shell: bash
        run: |
          echo "Image URL: ${{ steps.output.outputs.image_url }}"
          echo "Pushed: ${{ steps.output.outputs.pushed }}"

      - name: Workflow Summary
        shell: bash
        run: |
          {
            echo "## 🐳 Docker Build Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | ${{ steps.meta.outputs.image }} |"
            echo "| Image URL | ${{ steps.meta.outputs.image_url }} |"
            echo "| Push | ${{ steps.pushmode.outputs.push }} |"
            echo "| Digest | ${{ steps.build.outputs.digest }} |"
          } >> "$GITHUB_STEP_SUMMARY"