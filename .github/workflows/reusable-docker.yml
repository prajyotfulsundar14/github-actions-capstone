name: Reusable Docker

on:

  workflow_call:

    inputs:

      image_name:

        required: true
        type: string

      tag:

        required: true
        type: string

    secrets:

      docker_username:
        required: true

      docker_token:
        required: true

    outputs:

      image_url:
        value: ${{ jobs.docker.outputs.image }}

jobs:

  docker:

    runs-on: ubuntu-latest

    outputs:

      image: ${{ steps.image.outputs.url }}

    steps:

      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.docker_username }}
          password: ${{ secrets.docker_token }}

      - name: Build Image
        run: |
          docker build -t ${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }} .

      - name: Push Image
        run: |
          docker push ${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}

      - id: image
        run: |
          echo "url=${{ secrets.docker_username }}/${{ inputs.image_name }}:${{ inputs.tag }}" >> $GITHUB_OUTPUT