name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

concurrency:
  group: main-pipeline
  cancel-in-progress: false

env:
  IMAGE_NAME: ${{ secrets.DOCKER_USERNAME }}/github-actions-capstone
  IMAGE_TAG: latest

jobs:
  prep:
    name: 0. Prepare Metadata
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Generate Short SHA
        id: sha
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build-test:
    name: 1. Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true

  docker:
    name: 2. Docker Build & Push
    needs:
      - prep
      - build-test

    if: needs.build-test.outputs.test_result == 'passed'

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: github-actions-capstone
      tag: latest
      extra_tags: sha-${{ needs.prep.outputs.short_sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  security-scan:
    name: 3. DevSecOps - Trivy Scan
    needs: docker
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
          sudo sh -s -- -b /usr/local/bin
          trivy --version

      - name: Show Image
        run: |
          echo "Scanning image:"
          echo "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Generate SARIF
        run: |
          trivy image \
            --scanners vuln \
            --format sarif \
            --output trivy-results.sarif \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on Critical CVEs
        run: |
          trivy image \
            --scanners vuln \
            --severity CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-results.sarif

  deploy:
    name: 4. Deploy to Production

    needs:
      - prep
      - docker
      - security-scan

    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Deploy
        run: |
          echo "Deploying ${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Deployment Summary
        run: |
          {
            echo "## 🚀 Deployment Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | ${IMAGE_NAME}:${IMAGE_TAG} |"
            echo "| Environment | production |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Short SHA | ${{ needs.prep.outputs.short_sha }} |"
            echo "| Actor | ${{ github.actor }} |"
            echo "| Status | Success ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"