name: Main CI/CD Pipeline

on:
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: main-pipeline
  cancel-in-progress: false

jobs:
  prep:
    name: 0. Prepare Metadata
    runs-on: ubuntu-latest
    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}
    steps:
      - name: Generate short SHA
        id: sha
        run: echo "short_sha=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

  build-test:
    name: 1. Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20.x"
      run_tests: true

  docker:
    name: 2. Docker Build & Push
    needs: [prep, build-test]
    if: needs.build-test.outputs.test_result == 'passed'
    uses: ./.github/workflows/reusable-docker.yml
    with:
      image_name: "github-actions-capstone"
      tag: "latest"
      extra_tags: "sha-${{ needs.prep.outputs.short_sha }}"
      push: true
    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  security-scan:
    name: 3. DevSecOps - Trivy Vulnerability Scan
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Trivy CLI is installed directly with a pinned version rather than via
      # the aquasecurity/trivy-action wrapper. The wrapper action's tags have
      # been unstable (a pinned tag can silently resolve to a different
      # release, and its binary-download step has been flaky). Installing
      # the CLI directly is more reliable and auditable for an enterprise
      # pipeline.
      - name: Install Trivy (pinned version)
        run: |
          set -euo pipefail
          TRIVY_VERSION="0.72.0"
          curl -sfL -o trivy.deb \
            "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.deb"
          sudo dpkg -i trivy.deb || sudo apt-get install -f -y
          rm -f trivy.deb
          trivy --version

      - name: Run Trivy scan (SARIF report, non-blocking)
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --exit-code 0 \
            --timeout 10m \
            "${{ needs.docker.outputs.image_url }}"

      - name: Upload Trivy SARIF report to code scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Fail pipeline on CRITICAL CVEs
        run: |
          trivy image \
            --format table \
            --severity CRITICAL \
            --exit-code 1 \
            --ignore-unfixed \
            --timeout 10m \
            "${{ needs.docker.outputs.image_url }}"

      - name: Upload scan report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report
          path: trivy-results.sarif
          retention-days: 30

  deploy:
    name: 4. Deploy to Production
    needs: [prep, docker, security-scan]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy
        run: |
          echo "Deploying image: ${{ needs.docker.outputs.image_url }} to production"
          echo "### 🚀 Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ needs.docker.outputs.image_url }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Environment: \`production\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Commit: \`${{ github.sha }}\` (short: \`${{ needs.prep.outputs.short_sha }}\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "- Triggered by: \`${{ github.actor }}\`" >> "$GITHUB_STEP_SUMMARY"
