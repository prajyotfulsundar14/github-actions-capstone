name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

concurrency:
  group: main-pipeline
  cancel-in-progress: false

jobs:
  prep:
    name: 0. Prepare Metadata
    runs-on: ubuntu-latest

    outputs:
      short_sha: ${{ steps.sha.outputs.short_sha }}

    steps:
      - name: Generate short SHA
        id: sha
        shell: bash
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build-test:
    name: 1. Build & Test

    uses: ./.github/workflows/reusable-build-test.yml

    with:
      node_version: "20"
      run_tests: true

  docker:
    name: 2. Docker Build & Push

    needs:
      - prep
      - build-test

    if: needs.build-test.outputs.test_result == 'passed'

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: github-actions-capstone
      tag: latest
      extra_tags: sha-${{ needs.prep.outputs.short_sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  security-scan:
    name: 3. DevSecOps - Trivy Scan

    needs: docker

    runs-on: ubuntu-latest

    steps:
      - name: Show Docker Output
        run: |
          echo "Image URL = '${{ needs.docker.outputs.image_url }}'"

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Trivy
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y wget
          wget -qO- https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | \
            sudo sh -s -- -b /usr/local/bin

          trivy --version

      - name: Generate SARIF Report
        shell: bash
        run: |
          echo "Scanning image: ${{ needs.docker.outputs.image_url }}"
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            --timeout 10m \
            --exit-code 0 \
            "${{ needs.docker.outputs.image_url }}"

      - name: Upload SARIF
        if: hashFiles('trivy-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on Critical Vulnerabilities
        shell: bash
        run: |
          trivy image \
            --severity CRITICAL \
            --ignore-unfixed \
            --timeout 10m \
            --exit-code 1 \
            "${{ needs.docker.outputs.image_url }}"

      - name: Upload Trivy Report
        if: hashFiles('trivy-results.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report
          path: trivy-results.sarif
          retention-days: 30

  deploy:
    name: 4. Deploy to Production

    needs:
      - prep
      - docker
      - security-scan

    if: needs.docker.outputs.pushed == 'true'

    runs-on: ubuntu-latest

    environment: production

    steps:
      - name: Deployment Summary
        shell: bash
        run: |
          echo "Deploying image: ${{ needs.docker.outputs.image_url }}"

          {
            echo "## 🚀 Deployment Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | ${{ needs.docker.outputs.image_url }} |"
            echo "| Environment | production |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Short SHA | ${{ needs.prep.outputs.short_sha }} |"
            echo "| Actor | ${{ github.actor }} |"
            echo "| Status | Success ✅ |"
          } >> "$GITHUB_STEP_SUMMARY"