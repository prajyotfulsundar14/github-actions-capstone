name: Main CI/CD Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: read
  security-events: write

concurrency:
  group: main-pipeline
  cancel-in-progress: false

jobs:
  build-test:
    name: 1. Build & Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      node_version: "20"
      run_tests: true

  docker:
    name: 2. Docker Build & Push
    needs: build-test

    if: needs.build-test.outputs.test_result == 'passed'

    uses: ./.github/workflows/reusable-docker.yml

    with:
      image_name: github-actions-capstone
      tag: latest
      extra_tags: sha-${{ github.sha }}
      push: true

    secrets:
      docker_username: ${{ secrets.DOCKER_USERNAME }}
      docker_token: ${{ secrets.DOCKER_TOKEN }}

  security-scan:
    name: 3. DevSecOps - Trivy Scan

    needs: docker

    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Scan Docker image (SARIF)
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ needs.docker.outputs.image_url }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

      - name: Fail on Critical Vulnerabilities
        uses: aquasecurity/trivy-action@v0.33.1
        with:
          image-ref: ${{ needs.docker.outputs.image_url }}
          format: table
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-results.sarif
          retention-days: 30

  deploy:
    name: 4. Deploy to Production

    needs:
      - docker
      - security-scan

    runs-on: ubuntu-latest

    environment:
      name: production

    steps:
      - name: Deployment Summary
        run: |
          echo "Deploying image:"
          echo "${{ needs.docker.outputs.image_url }}"

          {
            echo "## 🚀 Deployment Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | ${{ needs.docker.outputs.image_url }} |"
            echo "| Environment | production |"
            echo "| Commit | ${{ github.sha }} |"
            echo "| Actor | ${{ github.actor }} |"
            echo "| Status | Success ✅ |"
          } >> $GITHUB_STEP_SUMMARY